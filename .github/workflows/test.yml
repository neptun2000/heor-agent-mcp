name: Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# No untrusted inputs (issue titles, PR bodies, commit messages) used in
# any run: command — workflow injection attack surface is none.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
